services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: sistema_salc
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes: ["./backend:/app"]
    working_dir: /app
    env_file: .env
    depends_on: [postgres]
    ports: ["8000:8000"]
  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes: ["./frontend:/app"]
    environment:
      VITE_API_URL: http://localhost:8000
    ports: ["5173:5173"]
volumes:
  pgdata:
